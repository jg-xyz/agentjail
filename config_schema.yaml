# ============================================================
#  AgentJail — Configuration Schema
#  Default location: ~/.config/agentjail/config.yaml
#
#  Generate a clean starter config with:
#    agentjail --config
# ============================================================


# --------------------------------------------------------------
# default_editor
#   The editor binary to make available as the "edit" alias
#   inside the container, and to set the $EDITOR environment
#   variable.
#
#   Common values: micro | vim | nano
#   Default: micro
# --------------------------------------------------------------
default_editor: micro          # micro | vim | nano


# --------------------------------------------------------------
# default_shell
#   The shell to use inside the container.
#   This controls both the interactive shell and the $SHELL
#   environment variable.
#
#   Supported values: zsh | bash
#   Default: zsh
# --------------------------------------------------------------
default_shell: zsh             # zsh | bash


# --------------------------------------------------------------
# mount_system_gitconfig
#   When true, mounts ~/.gitconfig from the host into the
#   container at /root/.gitconfig so git identity and settings
#   are available without reconfiguration.
#
#   Values: true | false
#   Default: true
# --------------------------------------------------------------
mount_system_gitconfig: true   # true | false


# --------------------------------------------------------------
# mount_gh_config_dir
#   When true, mounts ~/.config/gh from the host into the
#   container. This is the primary authentication store for the
#   gh CLI and the GitHub Copilot extension.
#
#   Values: true | false
#   Default: true
# --------------------------------------------------------------
mount_gh_config_dir: true          # true | false


# --------------------------------------------------------------
# github_token
#   A GitHub personal access token (classic or fine-grained)
#   to inject as GH_TOKEN into the container.
#   Useful when gh CLI config is not mounted.
#
#   Falls back (in order) to:
#     1. This field
#     2. GH_TOKEN on the host
#     3. GITHUB_TOKEN on the host
#
#   Leave empty to rely on the fallback chain.
#   Default: "" (empty — use fallback)
# --------------------------------------------------------------
github_token: ""               # any PAT string, or "" to use fallback chain


# --------------------------------------------------------------
# inject_gh_auth_token
#   When true, ensures GITHUB_TOKEN is available inside the
#   container by walking the standard token fallback chain:
#     1. github_token (from this config file)
#     2. GH_TOKEN environment variable on the host
#     3. GITHUB_TOKEN environment variable on the host
#     4. Output of "gh auth token" on the host (gh CLI)
#
#   The first non-empty value found is injected as GITHUB_TOKEN.
#   This option has no effect when GITHUB_TOKEN is already
#   explicitly set via container_env_vars.
#
#   Values: true | false
#   Default: false
# --------------------------------------------------------------
inject_gh_auth_token: false    # true | false


# --------------------------------------------------------------
# preferred_agent
#   The agent to launch automatically when the -A flag is used.
#   Must match the key of an enabled entry under agent_frameworks.
#
#   Available values: copilot | opencode | claude
#   Leave empty to be prompted interactively when using -A.
#   Default: "" (empty — prompt on -A)
# --------------------------------------------------------------
preferred_agent: ""            # "" (prompt on -A) | copilot | opencode | claude


# --------------------------------------------------------------
# use_zellij
#   When true, the container starts inside a zellij session with
#   three tabs:
#     tab 1 — preferred agent (auto-starts on first prompt)
#     tab 2 — plain terminal
#     tab 3 — file browser (see file_browser below)
#   When false, the container drops directly into a shell (or
#   runs the agent when -A is passed, as before).
#
#   Values: true | false
#   Default: true
# --------------------------------------------------------------
use_zellij: true               # true | false


# --------------------------------------------------------------
# file_browser
#   Command launched in the file browser tab when use_zellij is
#   true. Built-in options are installed conditionally at image
#   build time; changing this requires a rebuild (agentjail -b).
#
#   Values: rovr | yazi | nnn | spf | <any command>
#   Default: rovr
# --------------------------------------------------------------
file_browser: rovr             # rovr | yazi | nnn | spf | <any command>


# --------------------------------------------------------------
# zellij_plugins
#   A list of Zellij plugin .wasm files to load in the bottom
#   status bar (right side, alongside the keybind hints bar).
#   Each entry specifies the plugin via one of:
#
#     path: absolute or ~/... path to a .wasm file on the host.
#           The file is copied into .agentjail/zellij/plugins/
#           on every launch.
#
#     url:  direct URL to download the .wasm from (e.g. a GitHub
#           Releases asset). Downloaded once and cached in
#           .agentjail/zellij/plugins/; subsequent launches skip
#           the download if the file is already present.
#
#   Missing files and failed downloads are skipped with a warning
#   rather than blocking the container from starting.
#
#   Default: [] (no plugins)
# --------------------------------------------------------------
zellij_plugins: []

# Examples:
#   zellij_plugins:
#     - path: "~/projects/zellij-claude-limits/dist/zellij_claude_limits.wasm"
#     - url: "https://raw.githubusercontent.com/jg-xyz/zellij-claude-limits/main/dist/zellij_claude_limits.wasm"


# ============================================================
#  agent_frameworks
#  Controls which AI agent CLIs are installed in the container
#  image and made available at runtime.
#  Changes to enabled flags require rebuilding the image
#  (agentjail --build).
# ============================================================
agent_frameworks:

  # ------------------------------------------------------------
  # agent_frameworks.opencode
  #   OpenCode — open-source terminal AI coding agent.
  #   Homepage: https://opencode.ai
  #
  #   enabled
  #     Install opencode in the container image and mount its
  #     config/auth directories.
  #     Values: true | false
  #     Default: false
  #
  #   plugins
  #     List of OpenCode plugin names to enable.
  #     Default: [] (none)
  # ------------------------------------------------------------
  opencode:
    enabled: false             # true | false  (requires --build to take effect)
    plugins: []                # list of OpenCode plugin names, e.g. [my-plugin]

  # ------------------------------------------------------------
  # agent_frameworks.copilot
  #   GitHub Copilot CLI — AI agent via the gh copilot extension.
  #   Homepage: https://githubnext.com/projects/copilot-cli
  #
  #   enabled
  #     Install the gh copilot extension in the container image
  #     and mount Copilot credential directories.
  #     Values: true | false
  #     Default: true
  #
  #   plugins
  #     Reserved for future use.
  #     Default: [] (none)
  # ------------------------------------------------------------
  copilot:
    enabled: true              # true | false  (requires --build to take effect)
    plugins: []                # reserved for future use

  # ------------------------------------------------------------
  # agent_frameworks.claude
  #   Claude Code — Anthropic's AI coding CLI.
  #   Homepage: https://claude.ai/code
  #
  #   enabled
  #     Install claude in the container image and mount
  #     ~/.claude and ~/.claude.json from the host for auth
  #     persistence. Also injects ANTHROPIC_API_KEY if set.
  #     Values: true | false
  #     Default: false
  # ------------------------------------------------------------
  claude:
    enabled: false             # true | false  (requires --build to take effect)
    plugins: []                # reserved for future use


# ============================================================
#  container_env_vars
#  A map of environment variables to inject into the container
#  at startup via docker run -e.
#
#  Two value schemas are supported:
#
#    CONT_VAR: literal_value
#      Sets CONT_VAR to the literal string "literal_value".
#
#    CONT_VAR: env:HOST_VAR
#      Reads HOST_VAR from the host environment at launch time
#      and sets CONT_VAR to that value inside the container.
#      If HOST_VAR is not set on the host, CONT_VAR is not set
#      in the container (the -e flag is omitted).
#
#  Default: {} (no extra environment variables)
# ============================================================
container_env_vars: {}         # VAR: value  or  VAR: env:HOST_VAR

# Examples:
#   ANTHROPIC_API_KEY: env:ANTHROPIC_API_KEY   # forward a host API key
#   OPENAI_API_KEY: env:OPENAI_API_KEY         # forward a host API key
#   MY_TEAM: acme                              # inject a literal value
#   DEBUG: "false"                             # inject a literal value


# --------------------------------------------------------------
# port_mappings
#   A list of port mappings to publish from the container to the
#   host at startup, equivalent to docker run -p.
#
#   Each entry uses Docker's -p format:
#     [hostIP:]hostPort:containerPort[/protocol]
#   or simply containerPort (Docker assigns a random host port).
#
#   These are merged with any -p flags passed on the command line.
#
#   Default: [] (no ports published)
# --------------------------------------------------------------
port_mappings: []              # "[hostIP:]hostPort:containerPort[/protocol]"

# Examples:
#   - "8080:8080"              # forward host 8080 -> container 8080
#   - "127.0.0.1:3000:3000"   # bind only on loopback
#   - "5432:5432/tcp"         # explicit TCP protocol
